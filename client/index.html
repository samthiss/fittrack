<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover + maximum-scale=1/user-scalable=no: lets CSS read env(safe-area-inset-*)
         under the notch/home indicator, and stops iOS Safari's double-tap/pinch zoom from fighting
         with the app's own tap targets — this is meant to feel installed, not like a browser tab. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#131318" />
    <!-- Add to Home Screen -> standalone (no Safari chrome), matching the dark theme, status bar
         text drawn over the app's own background instead of a white bar. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitTrack" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>FitTrack</title>
    <script>
      // 100dvh/100svh have been unreliable in standalone (Add to Home Screen) mode on some iOS
      // versions — they can end up shorter than the actual visible area, leaving a gap of the
      // page's own background exposed below fixed/flex-bottom content. window.visualViewport
      // (or innerHeight as a fallback) reports the real, current visible height directly, so
      // --app-height is used instead of the vh units wherever the layout needs the true screen
      // height (see .app, html, body, #root in the stylesheets).
      (function () {
        function setAppHeight() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty('--app-height', h + 'px');
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
